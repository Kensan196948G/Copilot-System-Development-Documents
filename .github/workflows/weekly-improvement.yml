name: Weekly Documentation Improvement Report

on:
  schedule:
    - cron: '0 0 * * 0'  # 毎週日曜日 00:00 UTC
  workflow_dispatch:
    inputs:
      force_report:
        description: 'Force report generation'
        required: false
        default: 'false'

jobs:
  weekly-report:
    name: Generate Weekly Stats Report
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 全履歴取得（統計用）
      
      - name: Collect Document Statistics
        id: stats
        run: |
          TOTAL_FILES=$(find . -name '*.md' -not -path './.git/*' | wc -l)
          TOTAL_LINES=$(find . -name '*.md' -not -path './.git/*' -exec cat {} \; | wc -l)
          WEEKLY_COMMITS=$(git log --since='7 days ago' --oneline | wc -l)
          CHANGED_FILES=$(git diff --name-only HEAD~7 HEAD 2>/dev/null | grep '\.md$' | wc -l || echo 0)
          echo "total_files=$TOTAL_FILES" >> $GITHUB_OUTPUT
          echo "total_lines=$TOTAL_LINES" >> $GITHUB_OUTPUT
          echo "weekly_commits=$WEEKLY_COMMITS" >> $GITHUB_OUTPUT
          echo "changed_files=$CHANGED_FILES" >> $GITHUB_OUTPUT
      
      - name: Create Weekly Report Issue
        uses: actions/github-script@v7
        env:
          TOTAL_FILES: ${{ steps.stats.outputs.total_files }}
          TOTAL_LINES: ${{ steps.stats.outputs.total_lines }}
          WEEKLY_COMMITS: ${{ steps.stats.outputs.weekly_commits }}
          CHANGED_FILES: ${{ steps.stats.outputs.changed_files }}
        with:
          script: |
            const { TOTAL_FILES, TOTAL_LINES, WEEKLY_COMMITS, CHANGED_FILES } = process.env;
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 週次ドキュメント統計レポート (${new Date().toISOString().split('T')[0]})`,
              body: `## 📊 週次統計レポート\n\n| 指標 | 値 |\n|------|----|\n| 総ドキュメント数 | ${TOTAL_FILES} |\n| 総行数 | ${TOTAL_LINES} |\n| 週間コミット数 | ${WEEKLY_COMMITS} |\n| 変更ファイル数 | ${CHANGED_FILES} |\n\n自動生成: GitHub Actions weekly-improvement workflow`,
              labels: ['documentation', 'weekly-report']
            });
            console.log('Issue created:', issue.html_url);
