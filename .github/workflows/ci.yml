name: Document Quality CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install markdownlint
        run: npm install -g markdownlint-cli
      - name: Run markdownlint
        run: markdownlint "**/*.md" --ignore node_modules --ignore ".git/**" --config .markdownlint.json

  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gaurav-nelson/github-action-markdown-link-check@d5577f7aec634a5d88b7715e5c3120d930bb69c1 # v1.0.8
        with:
          use-quiet-mode: 'yes'
          config-file: '.mlc-config.json'
          folder-path: '.'

  doc-stats:
    name: Document Statistics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Count documents
        run: |
          echo "## Document Statistics" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total .md files | $(find . -name '*.md' -not -path './.git/*' | wc -l) |" >> $GITHUB_STEP_SUMMARY
          echo "| Total lines | $(find . -name '*.md' -not -path './.git/*' -exec cat {} \; | wc -l) |" >> $GITHUB_STEP_SUMMARY
          echo "| Total size | $(du -sh . --exclude=.git | cut -f1) |" >> $GITHUB_STEP_SUMMARY
